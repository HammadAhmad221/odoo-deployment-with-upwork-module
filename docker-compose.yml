version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: StrongPass2024!
    volumes:
      - postgres-data:/var/lib/postgresql/data

  odoo:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      HOST: db
      USER: odoo
      PASSWORD: StrongPass2024!
    volumes:
      - odoo-data:/var/lib/odoo
    expose:
      - "8069"
      - "8072"

volumes:
  odoo-data:
  postgres-data:
